<svg width="920" height="480" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000015"/></filter>
  </defs>

  <rect width="920" height="480" fill="#f8fafc" rx="10"/>
  <text x="460" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a" letter-spacing="0.3">AGENT INTERACTION — DATA FLOW THROUGH PIPELINE CONTEXT</text>

  <!-- ── Participants (columns) ──────────────────────── -->
  <!-- Developer -->
  <rect x="30" y="50" width="110" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="85" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">Developer</text>
  <!-- Arch Agent -->
  <rect x="220" y="50" width="130" height="40" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="285" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Architecture Agent</text>
  <!-- Backend Agent -->
  <rect x="430" y="50" width="130" height="40" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="495" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Backend Agent</text>
  <!-- Reviewer Agent -->
  <rect x="640" y="50" width="130" height="40" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="705" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Reviewer Agent</text>
  <!-- Output -->
  <rect x="820" y="50" width="84" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="862" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Output</text>

  <!-- Lifelines -->
  <line x1="85"  y1="90" x2="85"  y2="450" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="285" y1="90" x2="285" y2="450" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="495" y1="90" x2="495" y2="450" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="705" y1="90" x2="705" y2="450" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="862" y1="90" x2="862" y2="450" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ── Interaction 1: Developer → Architecture ────── -->
  <line x1="85" y1="130" x2="280" y2="130" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="182" y="122" text-anchor="middle" font-size="9.5" fill="#1d4ed8">feature: "User auth with JWT..."</text>

  <!-- Arch processing box -->
  <rect x="260" y="140" width="50" height="38" rx="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="285" y="157" text-anchor="middle" font-size="8.5" fill="#4c1d95">keyword</text>
  <text x="285" y="170" text-anchor="middle" font-size="8.5" fill="#4c1d95">extract</text>

  <!-- Arch → PipelineContext (stage_outputs) -->
  <rect x="60" y="192" width="780" height="34" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="208" text-anchor="middle" font-size="9.5" font-weight="600" fill="#475569">PipelineContext.stage_outputs["architecture"] = &#123; entities, models, routes, security_concerns &#125;</text>
  <text x="450" y="220" text-anchor="middle" font-size="8.5" fill="#64748b">stored in shared context — available to all downstream stages</text>

  <!-- PipelineContext → Backend -->
  <line x1="490" y1="226" x2="490" y2="248" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <text x="530" y="242" font-size="8.5" fill="#64748b">reads context</text>

  <!-- Backend processing box -->
  <rect x="470" y="250" width="50" height="38" rx="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="495" y="267" text-anchor="middle" font-size="8.5" fill="#4c1d95">generate</text>
  <text x="495" y="280" text-anchor="middle" font-size="8.5" fill="#4c1d95">FastAPI</text>

  <!-- Backend writes files to disk -->
  <line x1="521" y1="269" x2="856" y2="269" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="688" y="261" text-anchor="middle" font-size="9" fill="#15803d">write files to generated/&lt;slug&gt;/</text>

  <!-- Backend → stage_outputs -->
  <rect x="60" y="296" width="780" height="34" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="312" text-anchor="middle" font-size="9.5" font-weight="600" fill="#475569">PipelineContext.stage_outputs["backend"] = &#123; files, entities_implemented, route_count &#125;</text>
  <text x="450" y="324" text-anchor="middle" font-size="8.5" fill="#64748b">stored in shared context — available to reviewer</text>

  <!-- PipelineContext → Reviewer -->
  <line x1="700" y1="330" x2="700" y2="352" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <text x="738" y="346" font-size="8.5" fill="#64748b">reads context</text>

  <!-- Reviewer processing box -->
  <rect x="680" y="354" width="50" height="38" rx="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="705" y="371" text-anchor="middle" font-size="8.5" fill="#4c1d95">ast</text>
  <text x="705" y="384" text-anchor="middle" font-size="8.5" fill="#4c1d95">analysis</text>

  <!-- Reviewer → Developer (report) -->
  <line x1="680" y1="374" x2="91" y2="374" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="380" y="366" text-anchor="middle" font-size="9" fill="#475569">review report: score 10/10, 0 errors, approved=True</text>

  <!-- Final output -->
  <rect x="60" y="400" width="780" height="34" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Pipeline complete — FastAPI project written to disk and reviewed</text>
  <text x="450" y="430" text-anchor="middle" font-size="9" fill="#15803d">cd generated/&lt;slug&gt; &amp;&amp; uvicorn main:app --reload  →  http://localhost:8000/docs</text>
</svg>
