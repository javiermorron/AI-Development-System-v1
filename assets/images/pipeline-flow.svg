<svg width="920" height="260" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="260" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b" letter-spacing="0.3">EXAMPLE PIPELINE — THREE-STAGE AGENT FLOW</text>

  <!-- ── Box 1: Input ──────────────────────────── -->
  <rect x="18" y="68" width="148" height="76" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="92" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Feature</text>
  <text x="92" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Description</text>
  <text x="92" y="132" text-anchor="middle" font-size="9.5" fill="#3b82f6">plain text prompt</text>

  <!-- Arrow 1 -->
  <line x1="168" y1="106" x2="193" y2="106" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="180" y="97" text-anchor="middle" font-size="8.5" fill="#94a3b8">feature text</text>

  <!-- ── Box 2: Architecture Agent ─────────────── -->
  <rect x="195" y="68" width="160" height="76" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="275" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Architecture</text>
  <text x="275" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Agent</text>
  <text x="275" y="128" text-anchor="middle" font-size="9" fill="#6d28d9">entities · routes · models</text>
  <text x="275" y="140" text-anchor="middle" font-size="8.5" fill="#7c3aed">security concerns</text>

  <!-- Arrow 2 -->
  <line x1="357" y1="106" x2="382" y2="106" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="369" y="97" text-anchor="middle" font-size="8.5" fill="#94a3b8">design plan</text>

  <!-- ── Box 3: Backend Agent ──────────────────── -->
  <rect x="384" y="68" width="160" height="76" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="464" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Backend</text>
  <text x="464" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Agent</text>
  <text x="464" y="128" text-anchor="middle" font-size="9" fill="#6d28d9">FastAPI code generator</text>
  <text x="464" y="140" text-anchor="middle" font-size="8.5" fill="#7c3aed">models · schemas · routers</text>

  <!-- Arrow 3 -->
  <line x1="546" y1="106" x2="571" y2="106" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="558" y="97" text-anchor="middle" font-size="8.5" fill="#94a3b8">Python files</text>

  <!-- ── Box 4: Reviewer Agent ─────────────────── -->
  <rect x="573" y="68" width="160" height="76" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="653" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Reviewer</text>
  <text x="653" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">Agent</text>
  <text x="653" y="128" text-anchor="middle" font-size="9" fill="#6d28d9">AST static analysis</text>
  <text x="653" y="140" text-anchor="middle" font-size="8.5" fill="#7c3aed">score 0–10 · findings</text>

  <!-- Arrow 4 -->
  <line x1="735" y1="106" x2="760" y2="106" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="747" y="97" text-anchor="middle" font-size="8.5" fill="#94a3b8">reviewed files</text>

  <!-- ── Box 5: Output ─────────────────────────── -->
  <rect x="762" y="68" width="148" height="76" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="836" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">generated/</text>
  <text x="836" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">&lt;slug&gt;/</text>
  <text x="836" y="128" text-anchor="middle" font-size="9" fill="#15803d">main.py · routers/</text>
  <text x="836" y="140" text-anchor="middle" font-size="8.5" fill="#16a34a">schemas · requirements</text>

  <!-- ── Stage labels ───────────────────────────── -->
  <text x="92"  y="178" text-anchor="middle" font-size="9.5" font-weight="500" fill="#64748b">INPUT</text>
  <text x="275" y="178" text-anchor="middle" font-size="9.5" font-weight="500" fill="#64748b">STAGE 1</text>
  <text x="464" y="178" text-anchor="middle" font-size="9.5" font-weight="500" fill="#64748b">STAGE 2</text>
  <text x="653" y="178" text-anchor="middle" font-size="9.5" font-weight="500" fill="#64748b">STAGE 3</text>
  <text x="836" y="178" text-anchor="middle" font-size="9.5" font-weight="500" fill="#64748b">OUTPUT</text>

  <!-- ── PipelineContext footer bar ─────────────── -->
  <rect x="18" y="196" width="892" height="42" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="460" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">PipelineContext</text>
  <text x="460" y="228" text-anchor="middle" font-size="9.5" fill="#64748b">stage_outputs["architecture"] &#8594; stage_outputs["backend"] &#8594; stage_outputs["reviewer"]</text>
</svg>
