  <!-- Divider -->
  <line x1="20" y1="368" x2="620" y2="368" stroke="#1e293b" stroke-width="1"/>

  <!-- Run command section -->
  <text x="30" y="392" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">TO RUN:</text>
  <text x="30" y="412" font-size="12" fill="#64748b">$</text>
  <text x="44" y="412" font-size="12" fill="#e2e8f0">cd generated/&lt;slug&gt;</text>
  <text x="30" y="432" font-size="12" fill="#64748b">$</text>
  <text x="44" y="432" font-size="12" fill="#e2e8f0">pip install -r requirements.txt</text>
  <text x="30" y="452" font-size="12" fill="#64748b">$</text>
  <text x="44" y="452" font-size="12" fill="#e2e8f0">uvicorn main:app --reload</text>
  <text x="30" y="475" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#22c55e">Open: http://localhost:8000/docs</text>
