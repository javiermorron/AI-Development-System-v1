<svg width="920" height="560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="560" fill="#f8fafc" rx="10"/>

  <!-- Title -->
  <text x="460" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.3">AI DEVELOPMENT SYSTEM — ARCHITECTURE OVERVIEW</text>

  <!-- ── Layer 0: Developer ──────────────────────── -->
  <rect x="340" y="52" width="240" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Developer</text>
  <text x="460" y="92" text-anchor="middle" font-size="10" fill="#3b82f6">aidev CLI  ·  config_example.yaml</text>

  <!-- Down arrow -->
  <line x1="460" y1="106" x2="460" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Layer 1: Pipeline Engine ─────────────────── -->
  <rect x="180" y="132" width="560" height="62" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Pipeline Engine</text>
  <text x="460" y="175" text-anchor="middle" font-size="10" fill="#16a34a">8 ordered stages  ·  fail-fast  ·  dependency resolution  ·  PipelineContext</text>

  <!-- Side: Security -->
  <rect x="36" y="132" width="128" height="62" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#sh)"/>
  <text x="100" y="157" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Security Layer</text>
  <text x="100" y="172" text-anchor="middle" font-size="9.5" fill="#b45309">Classifier (L1/L2/L3)</text>
  <text x="100" y="185" text-anchor="middle" font-size="9.5" fill="#b45309">Validator · Sanitizer</text>

  <!-- Side: Audit -->
  <rect x="756" y="132" width="128" height="62" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5" filter="url(#sh)"/>
  <text x="820" y="157" text-anchor="middle" font-size="11" font-weight="700" fill="#831843">Audit Logger</text>
  <text x="820" y="172" text-anchor="middle" font-size="9.5" fill="#9d174d">JSON Lines log</text>
  <text x="820" y="185" text-anchor="middle" font-size="9.5" fill="#9d174d">every action recorded</text>

  <!-- Horizontal lines from pipeline to security/audit -->
  <line x1="180" y1="163" x2="166" y2="163" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="740" y1="163" x2="754" y2="163" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Down arrows from Pipeline Engine to 3 agents -->
  <line x1="300" y1="196" x2="300" y2="228" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="460" y1="196" x2="460" y2="228" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="620" y1="196" x2="620" y2="228" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Layer 2: Three Agents ─────────────────────── -->
  <!-- Architecture Agent -->
  <rect x="180" y="230" width="230" height="82" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="295" y="254" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">Architecture Agent</text>
  <text x="295" y="272" text-anchor="middle" font-size="9.5" fill="#5b21b6">Input: feature description</text>
  <text x="295" y="287" text-anchor="middle" font-size="9.5" fill="#5b21b6">Output: entities, routes, models</text>
  <text x="295" y="302" text-anchor="middle" font-size="9" fill="#7c3aed">keyword extraction · security analysis</text>

  <!-- Backend Agent -->
  <rect x="345" y="230" width="230" height="82" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460" y="254" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">Backend Agent</text>
  <text x="460" y="272" text-anchor="middle" font-size="9.5" fill="#5b21b6">Input: design plan</text>
  <text x="460" y="287" text-anchor="middle" font-size="9.5" fill="#5b21b6">Output: FastAPI source files</text>
  <text x="460" y="302" text-anchor="middle" font-size="9" fill="#7c3aed">Pydantic · APIRouter · schemas</text>

  <!-- Reviewer Agent -->
  <rect x="510" y="230" width="230" height="82" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="625" y="254" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">Reviewer Agent</text>
  <text x="625" y="272" text-anchor="middle" font-size="9.5" fill="#5b21b6">Input: generated Python files</text>
  <text x="625" y="287" text-anchor="middle" font-size="9.5" fill="#5b21b6">Output: score · findings</text>
  <text x="625" y="302" text-anchor="middle" font-size="9" fill="#7c3aed">ast.parse · docstring · type hints</text>

  <!-- Data flow arrow between architecture and backend -->
  <line x1="410" y1="271" x2="343" y2="271" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="377" y="263" text-anchor="middle" font-size="8" fill="#7c3aed">stage_outputs</text>

  <!-- Data flow arrow between backend and reviewer -->
  <line x1="577" y1="271" x2="508" y2="271" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="542" y="263" text-anchor="middle" font-size="8" fill="#7c3aed">stage_outputs</text>

  <!-- Down arrow from Backend Agent to output -->
  <line x1="460" y1="314" x2="460" y2="348" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Layer 3: Generated Output ─────────────────── -->
  <rect x="180" y="350" width="560" height="68" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">generated/&lt;project-slug&gt;/</text>
  <text x="460" y="393" text-anchor="middle" font-size="10" fill="#15803d">main.py  ·  models.py  ·  schemas.py  ·  services.py  ·  repositories.py</text>
  <text x="460" y="410" text-anchor="middle" font-size="10" fill="#16a34a">routers/user.py  ·  routers/token.py  ·  ...  ·  requirements.txt  ·  README.md</text>

  <!-- ── Legend ─────────────────────────────────────── -->
  <rect x="180" y="438" width="560" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="460" y="458" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">CROSS-CUTTING CONCERNS</text>

  <!-- Legend items -->
  <rect x="205" y="470" width="12" height="12" rx="2" fill="#fef3c7" stroke="#d97706"/>
  <text x="225" y="481" font-size="10" fill="#475569">Security: every action classified (L1 Safe / L2 Sensitive / L3 Critical)</text>

  <rect x="205" y="492" width="12" height="12" rx="2" fill="#fce7f3" stroke="#db2777"/>
  <text x="225" y="503" font-size="10" fill="#475569">Audit: JSON Lines log — agent, tool, input, output, timestamp</text>

  <rect x="205" y="514" width="12" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="225" y="525" font-size="10" fill="#475569">Human-in-the-loop: Level 3 actions pause for explicit approval</text>
</svg>
